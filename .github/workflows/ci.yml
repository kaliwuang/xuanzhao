name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache perspectives data
        uses: actions/cache@v4
        with:
          path: |
            xuanzhao/perspectives/
            perspectives/
          key: ${{ runner.os }}-perspectives-${{ hashFiles('xuanzhao/perspectives/*.py', 'perspectives/*.py') }}
          restore-keys: |
            ${{ runner.os }}-perspectives-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v
