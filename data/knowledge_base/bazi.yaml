  # ========== 四、金不换大运 完整版 ==========
  jinbuhuan_dayun:
    theory: "金不换大运骨髓歌,以日主配合月令,定大运顺逆,论一生吉凶.顺逆大运之排法:阳男阴女顺排,阴男阳女逆排.月令定格局,大运定休咎."

    jia_ri:  # 甲日主 12月令
      months:
        寅月:
          dayun_sequences: [丙寅, 丁卯, 戊辰, 己巳, 庚午, 辛未]
          comment: "甲生寅月建禄格,初运木火通明,少年得意.中年土运财旺,晚年金运官杀攻身有制则贵."
          details: "丙寅运:禄上带食,才华初显.丁卯运:伤官生财,名利双收.戊辰运:偏财入库,财丰.己巳运:正财旺,但火炎需防.庚午运:七杀攻身,有制则贵.辛未运:正官合身,晚景荣华."
        卯月:
