  # ========== 九、格局法 完整版 ==========
  ge_ju:
    theory: "格局以月令而定,月令为提纲,定格局之正偏.正格八格:正官/七杀/正财/偏财/正印/偏印/食神/伤官."
    classification: "月令藏干透出者优先定格,不透则以月令本气定格."

    zheng_ba_ge:
      zhengguan:
        name: 正官格
        condition: "月令为日主之正官"
        standard: "官星清透,有财生印护,身强官旺为主贵"
        good: "官印相生,财官相生,官星有护"
        bad: "伤官见官,官杀混杂,官星被合"
        famous: "官星清透,印星护官,富贵之命"
      
      qisha:
        name: 七杀格
        condition: "月令为日主之七杀"
        standard: "七杀有制化为权,无制则为凶"
        good: "食神制杀,印星化杀,杀邀食制"
        bad: "七杀无制,杀旺身弱,杀刃相战"
        famous: "七杀有制化为权,英雄独压万人"
      
      zhengcai:
        name: 正财格
        condition: "月令为日主之正财"
        standard: "财星当令,食伤生财,身强胜财"
        good: "食伤生财,财官相生,财印相济"
        bad: "比劫夺财,财星破印,财星被合"
        famous: "财星当令,食伤生之,富贵之基"
      
      piancai:
        name: 偏财格
        condition: "月令为日主之偏财"
        standard: "偏财透干,身强胜财,大方慷慨"
        good: "偏财生官,食伤生财,财库相冲"
        bad: "比劫夺财,偏财被合,财多身弱"
        famous: "偏财透干慷慨,财库逢冲大发"
      
      zhengyin:
        name: 正印格
        condition: "月令为日主之正印"
        standard: "印星当令,官印相生,身旺主贵"
        good: "官印相生,杀印相生,印星护官"
        bad: "财星破印,印旺身弱,印星被合"
        famous: "印星当令主文贵,官印相生不可挡"
      
      pianyin:
        name: 偏印格
        condition: "月令为日主之偏印"
        standard: "偏印当令,身旺者主偏才"
        good: "杀印相生,偏印配伤官"
        bad: "偏印夺食,枭神夺食损子"
        famous: "偏印生身多为奇,伤官配印贵无疑"
      
      shishen:
        name: 食神格
        condition: "月令为日主之食神"
        standard: "食神当令,生财为用,主福寿"
        good: "食神生财,食神制杀,食神配印"
        bad: "枭神夺食,食神被合,食神太旺"
        famous: "食神生财富贵天,食神制杀权无边"
      
      shangguan:
        name: 伤官格
        condition: "月令为日主之伤官"
        standard: "伤官当令,配印生财为贵"
        good: "伤官配印,伤官生财,伤官驾杀"
        bad: "伤官见官,伤官无制,伤官太旺"
        famous: "伤官配印贵不可言,伤官生财富自来"

    cong_ge:  # 从格
      cong_wang:
        name: 从旺格
        description: "日主极旺,四柱无克泄耗,只能顺从旺势"
        types:
          - "从比劫格:木旺无金克,从木"
          - "从印格:印旺身强,从印"
          - "从强格:印比两旺"
        condition: "日主当令,四柱皆生扶,无一克泄耗"
        usage: "喜生扶,忌克泄耗.大运遇克泄耗则凶"
      
      cong_ruo:
        name: 从弱格
        description: "日主极弱,四柱无生扶,只能顺从弱势"
        types:
          - "从财格:财旺无印比"
          - "从官杀格:官杀旺无印"
          - "从儿格:食伤旺无印"
        condition: "日主失令,四柱皆克泄耗,无一帮扶"
        usage: "喜克泄耗,忌生扶.大运遇生扶则凶"
      
      cong_shi:
        name: 从势格
        description: "日主弱极,顺从旺势.旺什么就从什么"
        condition: "日主无根,四柱某一五行极旺"
        usage: "喜旺神,忌逆势"

    hua_qi_ge:  # 化气格
      theory: "日主与月干或时干相合,合化成功则为化气格"
      conditions:
        - "甲己合化土:需月令为辰戌丑未土旺之月"
        - "乙庚合化金:需月令为巳申酉丑金旺之月"
        - "丙辛合化水:需月令为申亥子丑水旺之月"
        - "丁壬合化木:需月令为寅卯亥未木旺之月"
        - "戊癸合化火:需月令为寅巳午未火旺之月"
      rules:
        - "合化必须化神旺相"
        - "日主必须无根或有根被合化"
        - "化神被克则合而不化"
        - "合化成功后以化神论命"
      famous: "化气格成多为奇,不鸣则已一鸣惊人"
