    # 五行生克关系
    five_elements_cycles:
      generating:
        - "木生火:木燃烧生火"
        - "火生土:火燃烧后化为灰土"
        - "土生金:土中蕴藏金属矿物"
        - "金生水:金属熔化为液体"
        - "水生木:水滋养树木生长"
      controlling:
        - "木克土:树木根系固土"
        - "土克水:土堤防水泛滥"
        - "水克火:水能灭火"
        - "火克金:火能熔化金属"
        - "金克木:刀斧砍伐树木"
      reverse_controlling:
        - "土悔木:土重木折(反克)"
        - "木悔金:木坚金缺"
        - "金悔火:金多火熄"
        - "火悔水:火炎水干"
        - "水悔土:水荡土崩"

    ten_gods:
      - name: 正官
        code: zhengguan
        alias: 官星
        relation: 克我者阴阳异
        meaning: 正职/官运/名誉/纪律/约束/规则
        positive: 正直/负责/稳重/守法/有领导力
        negative: 保守/压力/约束/循规蹈矩
        health: 胆/筋骨(木克土),精神压力
        empty: 男性不受益于好上司,女性丈夫调职/分居/婚缘不佳,儿女多病
        detailed: "正官为贵气之星,代表名誉地位,为命局喜用时主清正廉明;为忌时主压力重重.女命正官为夫星,最忌被伤官冲克."
        combination_notes: "伤官见官为祸百端;官印相生主贵;官星被合失其用"
      
      - name: 七杀
        code: qisha
