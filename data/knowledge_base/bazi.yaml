  # ========== 四、大运体系 ==========
  dayun:
    rule_male: "阳男顺排/阴男逆排"
    rule_female: "阳女逆排/阴女顺排"
    start_age: "以五行局定起运年龄"
    
    jin_bu_huan:  # 金不换大运（精选）
      jia_ri:
        - month: 寅月
          dayun: [丙寅, 丁卯, 戊辰, 己巳, 庚午, 辛未]
