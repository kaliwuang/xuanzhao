          dayun: [庚寅, 辛卯, 壬辰, 癸巳, 甲午, 乙未]
          comment: "春灯之火甲庚为用"

  # ========== 五、拱局/暗带 (P148-162) ==========
  gong_ju:
    definition: "两支夹出中间一字,如子午夹出巳丑"
    rule: "子午卯酉(其中一支为拱)"
    cha_fa: "月令为主,查年月日时支"
    meaning: "暗中助力/不完全的力量/背后支撑"

  an_dai:
    definition: "60组暗带关系,每个日柱暗带两个相关地支"
    meaning: "间接影响/隐藏的关系"

  # ========== 六、十神组合判断 ==========
  ten_god_combinations:
    shang_guan_jian_zhengguan:
      effect: "伤官见官,为祸百端"
      condition: "女命尤其不利婚姻"
    shang_guan_pei_zhengyin:
      effect: "伤官配印,贵不可言"
      condition: "需身强印旺"
