# 八字命理知识库 — 玄照(XuanZhao)项目
# 来源：《八字理论精华宝典》OCR精读至P294 + 多源综合
# 更新日期: 2026-05-26
# 用途: 108视角辩论引擎知识参考

bazi:
  metadata:
    source: "《八字理论精华宝典》+《子平真诠》+《滴天髓》+《渊海子平》综合"
    progress: "P295/647 (已完成45%)"
    total_knowledge_points: 98

  # ========== 一、核心概念 ==========
  core:
    five_elements:  # 五行
      wood:
        element: 木
        season: 春
        direction: 东
        color: 青/绿
        organs: 肝胆/目
        personality: 仁慈/正直/生长
        star: 岁星(木星)
        taste: 酸
        life: 长生在亥,帝旺在卯,墓在未
      fire:
        element: 火
        season: 夏
        direction: 南
        color: 红/赤
        organs: 心脏/小肠/目
        personality: 礼/热情/明亮
        star: 荧惑(火星)
        taste: 苦
        life: 长生在寅,帝旺在午,墓在戌
      earth:
        element: 土
        season: 季夏(四季末)
        direction: 中
        color: 黄/棕
        organs: 脾胃/口
        personality: 信/稳重/包容
        star: 镇星(土星)
        taste: 甘
        life: 长生在申,帝旺在子,墓在辰
      metal:
        element: 金
        season: 秋
        direction: 西
        color: 白
        organs: 肺/大肠/鼻
        personality: 义/果断/肃杀
        star: 太白(金星)
        taste: 辛
        life: 长生在巳,帝旺在酉,墓在丑
      water:
        element: 水
        season: 冬
        direction: 北
        color: 黑/蓝
        organs: 肾/膀胱/耳
        personality: 智/柔韧/流动
        star: 辰星(水星)
        taste: 咸
        life: 长生在申,帝旺在子,墓在辰

    ten_gods:  # 十神
      - name: 正官
        code: zhengguan
        relation: 克我者阴阳异
        meaning: 正职/官运/名誉/纪律
        positive: 正直/负责/稳重
        negative: 保守/压力/约束
        health: 肝胆(木克土)
        empty: 男性不受益于好上司,女性丈夫调职/分居/婚缘不佳
      
      - name: 七杀
        code: qisha
        relation: 克我者阴阳同
        meaning: 权力/威严/竞争/压力
        positive: 魄力/执行力/开创
        negative: 冲动/暴躁/多灾
        health: 肝胆/筋骨
        empty: 军政界权旁落,性格好勇斗狠或畏首畏尾
      
      - name: 正财
        code: zhengcai
        relation: 我克者阴阳异
        meaning: 稳定收入/正妻/固定资产
        positive: 务实/节俭/稳定
        negative: 吝啬/短视/固执
        health: 脾胃/消化
        empty: 与父无缘,成年易婚变,因欺诈损失财物,注意肠病
      
      - name: 偏财
        code: piancai
        relation: 我克者阴阳同
        meaning: 横财/投资/父亲/情人
        positive: 豪爽/灵活/社交
        negative: 挥霍/好色/不稳定
        health: 脾胃/胰腺
        empty: 与父无缘,性不耐静,色情之象,与祖父/岳父不合
      
      - name: 正印
        code: zhengyin
        relation: 生我者阴阳异
        meaning: 学识/文凭/长辈/庇护
        positive: 聪明/稳重/贵人
        negative: 依赖/迂腐/保守
        health: 肠胃/消化系统
        empty: 与母亲无缘,离乡,毁约背信,考试运不好
      
      - name: 偏印
        code: pianyin
        relation: 生我者阴阳同
        meaning: 特殊技能/偏才/继母
        positive: 独特/敏锐/创造力
        negative: 孤僻/古怪/不合群
        health: 神经系统/消化
        empty: 爱幻想/反省,不眠/精神衰弱,心浮气躁
      
      - name: 比肩
        code: bijian
        relation: 同我者阴阳同
        meaning: 兄弟/朋友/同辈/竞争
        positive: 独立/自信/合作
        negative: 固执/竞争/耗财
        health: 脾胃/四肢
        empty: 谋职/创业受阻多磨,服务业自由职业能有成就
      
      - name: 劫财
        code: jiecai
        relation: 同我者阴阳异
        meaning: 朋友/兄弟姐妹/合作
        positive: 义气/活跃/社交
        negative: 争财/破财/好斗
        health: 脾胃/肌肉
        empty: 狡诈
      
      - name: 食神
        code: shishen
        relation: 我生者阴阳同
        meaning: 才华/享受/口福/子女
        positive: 温和/艺术/创造力
        negative: 懒散/放纵/空想
        health: 胰腺/消化
        empty: 空亡不详(原文未详细记载)
      
      - name: 伤官
        code: shangguan
        relation: 我生者阴阳异
        meaning: 才华/叛逆/创新/口舌
        positive: 聪明/才华/创新
        negative: 傲慢/刻薄/犯上
        health: 肺/呼吸系统
        empty: 空亡不详(原文未详细记载)

    twelve_longevity:  # 十二长生
      - name: 长生
        order: 1
        meaning: 出生/开始/萌芽
        state: 最吉之一
        note: 犹如婴儿出世,万事开始
      - name: 沐浴
        order: 2
        meaning: 洗礼/桃花/天真
        state: 中性偏吉
        note: 犹如婴儿洗澡,桃花之地
      - name: 冠带
        order: 3
        meaning: 成长/学习/准备
        state: 吉
        note: 犹如成人礼,学业有成
      - name: 临官
        order: 4
        meaning: 任职/发展/工作
        state: 大吉
        note: 犹如做官,事业有成
      - name: 帝旺
        order: 5
        meaning: 顶峰/极盛/成功
        state: 最旺
        note: 犹如帝王,达到顶峰
      - name: 衰
        order: 6
        meaning: 衰退/减弱/退行
        state: 凶
        note: 盛极而衰
      - name: 病
        order: 7
        meaning: 生病/衰退/问题
        state: 凶
        note: 犹如生病,能量不足
      - name: 死
        order: 8
        meaning: 死亡/结束/停滞
        state: 大凶
        note: 犹如死亡,事物终结
      - name: 墓
        order: 9
        meaning: 墓库/收藏/积蓄
        state: 中性
        note: 犹如入墓,积蓄能量
      - name: 绝
        order: 10
        meaning: 灭绝/消失/极端
        state: 大凶
        note: 犹如灭绝,彻底消失
      - name: 胎
        order: 11
        meaning: 受胎/萌芽/酝酿
        state: 吉
        note: 犹如怀孕,新的开始
      - name: 养
        order: 12
        meaning: 养育/培养/成长
        state: 吉
        note: 犹如养育,积蓄力量

    nayin_relationships:  # 纳音长生十二宫
      metal:
        changsheng: 巳
        diwang: 酉
        mu: 丑
      wood:
        changsheng: 亥
        diwang: 卯
        mu: 未
      water:
        changsheng: 申
        diwang: 子
        mu: 辰
      fire:
        changsheng: 寅
        diwang: 午
        mu: 戌
      earth:
        changsheng: 申
        diwang: 子
        mu: 辰

  # ========== 二、空亡体系 (P145-153) ==========
  empty_death:
    theory:
      definition: "地支遇旬空为空亡,六十甲子每旬有两个地支为空"
      rule1: "空亡地支遇六合不为空"
      rule2: "空亡逢冲以吉论,纳音相生更好"
      rule3: "空亡的五行不起旺衰平衡作用,有视作无"
      rule4: "大运空而流年不空"
      rule5: "空亡逢同类型相冲极凶(天干相同地支相冲)"
      rule6: "空亡逢六合不论空,其年平顺"

    ten_gods:  # 十神空亡详解
      zhengcai:
        summary: "与父无缘,成年易婚变"
        details:
          - "因欺诈/盗贼蒙受财物损失"
          - "注意肠病"
          - "阳日生与妻缘分终尽(死或离)"
          - "阴日生则在情人身上发生"
          - "节俭者变挥霍,经济崩溃"
          - "好运也平白放过"
      piancai:
        summary: "与父无缘,性不耐静"
        details:
          - "色情之象"
          - "与祖父/岳父不合"
          - "多走动或职业需走动者吉"
      zhengyin:
        summary: "与母亲/祖国无缘,离乡或出国"
        details:
          - "与母亲生离死别"
          - "待人处事出错/毁约/背信"
          - "横刀夺爱"
          - "个性蒙昧/肤浅/草率"
          - "考试运不好,名誉受损"
      pianyin:
        summary: "爱幻想/反省,有时迷惘/逃避现实"
        details:
          - "想停止工作"
          - "身体不眠/精神衰弱"
          - "与母亲/继母/养母无缘"
          - "心浮气躁/轻举妄动/随波逐浪"
          - "动中破财,入不敷出"
          - "演艺工作者名气如昙花一现"
      zhengguan:
        summary: "男性不受益于好上司/儿女问题"
        details:
          - "女性丈夫调职/分居/婚缘不佳"
      qisha:
        summary: "军政界权旁落"
        details:
          - "常人可免受困境/病痛之苦"
          - "性格好勇斗狠或畏首畏尾"
      bijian:
        summary: "谋职/创业受阻多磨"
        details:
          - "服务业/自由职业能有成就"
      jiecai:
        summary: "狡诈"
      jianlu:
        summary: "虚名虚利,学而无成,一生破散"
      liuhai:
        summary: "横死"
      taohua:
        summary: "情缘困扰/情祸/感情失落"
      guiren:
        summary: "演艺人员/歌星/舞女/文艺创作者"

    swap_analysis:  # 空亡互换
      year_dayun: "年柱与大运互换空亡:多不利长亲(祖坟多空败)"
      month_dayun: "月柱和大运互换空亡:女和丈夫不利,男命父母兄弟不利"
      day_dayun: "生日与大运互换空亡:主配偶不利"
      hour_dayun: "时柱与大运互换空亡:主子女不利"
      year_liunian: "流年与大运互换空亡:测这一年一事无成"

    shen_sha_empty:  # 神煞空亡
      huagai: "聪明/脱俗/为僧道学者/诗人/画家"
      wangshen: "多好阿谀奉承,多靠文笔起家,家中有夭亡横死之人,有失落感"
      jiesha: "狡诈"
      guche_gua_su: "日月支坐孤虚或空亡多自己独处,性格孤僻,喜欢一人睡"

    life_stages:  # 生命阶段空亡论
      age_0_15:
        summary: "发育不良/学习退步/品行恶劣/离家出走/被绑票"
        caution: "忌正印落空亡"
      age_15_30:
        summary: "求学/深造/成家/立业阶段,若能渡过考验将来必成大人物"
        caution: "忌正官落空亡"
      age_30_50:
        summary: "家庭/事业/儿女最重要阶段"
        caution: "忌财/官落空亡,不宜生子/变动事业/祖坟风水"
      age_50_100:
        summary: "健康寿命最重要,人生已定型"
        note: "反而不忌空亡"

