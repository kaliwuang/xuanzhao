        detailed: "七杀为凶神,有制化为权柄,无制则为灾祸.七杀宜制化,食神制杀为上,印星化杀为次."
        combination_notes: "食神制杀英雄独压万人;杀印相生功名显达;七杀无制灾祸不断"
      
