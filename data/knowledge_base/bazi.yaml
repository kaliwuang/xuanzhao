    # ========== 十二长生完整版 120条断语 ==========
    twelve_longevity_complete:
      changsheng:  # 长生
        description: "出生/开始/萌芽——最吉之一,犹如婴儿出世,万事开始"
        positions:
          jia: "甲木长生在亥,亥为天河之水,木得水滋而生气盎然.甲生亥月身弱,但亥中有甲木长生,得水生助生机不绝,逢寅卯运发荣."
          yi: "乙木长生在午,午为火旺之地,乙木为花草,得午火温暖而荣.乙生午月身弱,但乙木长生得火暖土培,逢寅卯辰运发达."
          bing: "丙火长生在寅,寅为火之长生,丙火得寅木生而光明.丙生寅月火初生,春寒需木生,逢午戌运火焰冲天."
          ding: "丁火长生在酉,酉为金旺之地,丁火炼金成器.丁生酉月财旺,身弱需甲木生扶,逢寅卯运发福."
          wu: "戊土长生在寅,寅中甲木生丙火,火生戊土.戊生寅月七杀旺,得丙火印星化杀生身,主贵."
          ji: "己土长生在酉,酉中辛金泄己土,己生酉月食神旺.己土得丙火暖土,辛金泄秀,主聪明秀丽."
          geng: "庚金长生在巳,巳中丙火炼庚金,庚得火炼而成器.庚生巳月七杀旺,得壬水制杀为上格."
          xin: "辛金长生在子,子为水旺之地,辛金得水洗而晶莹.辛生子月食神旺,得壬水泄秀主聪明."
          ren: "壬水长生在申,申中庚金生壬水,水源远流长.壬生申月印旺身强,得火财暖水主富贵."
          gui: "癸水长生在卯,卯为木旺之地,癸水润木而施恩.癸生卯月食神旺,得庚金生水,有印有食主贵."

      muyu:  # 沐浴
        description: "洗礼/桃花/天真——中性偏吉,沐浴之地为桃花,情感丰富"
        positions:
          jia: "甲木沐浴在子,子水沐浴之地,桃花旺.甲生子月身弱,沐浴桃花主风流,需丙火暖局解寒."
          yi: "乙木沐浴在巳,巳火沐浴之地,桃花带火.乙生巳月伤官旺,沐浴桃花主感情丰富,需癸水润泽."
          bing: "丙火沐浴在卯,卯木沐浴之地,桃花带木.丙生卯月印旺,沐浴桃花主文化风流."
          ding: "丁火沐浴在申,申金沐浴之地,桃花带财.丁生申月财旺,沐浴桃花主因财色惹情缘."
          wu: "戊土沐浴在卯,卯木沐浴之地,桃花克土.戊生卯月沐浴,桃花伤官,主感情波折."
          ji: "己土沐浴在申,申金沐浴之地,桃花泄土.己生申月沐浴,桃花食神,主艺术风流."
          geng: "庚金沐浴在午,午火沐浴之地,桃花炼金.庚生午月沐浴,桃花七杀,主因色惹灾."
          xin: "辛金沐浴在亥,亥水沐浴之地,桃花润金.辛生亥月沐浴,桃花伤官,主情感细腻."
          ren: "壬水沐浴在酉,酉金沐浴之地,桃花生水.壬生酉月沐浴,桃花印星,主文采风流."
          gui: "癸水沐浴在寅,寅木沐浴之地,桃花泄水.癸生寅月沐浴,桃花伤官,主才情外露."

      guandai:  # 冠带
        description: "成长/学习/准备——吉,犹如成人加冠,学业有成"
        positions:
          jia: "甲木冠带在丑,丑中己土培木根,辛金修剪枝叶.甲生丑月冠带,财官双美,主少年得志."
          yi: "乙木冠带在辰,辰为水库培木,乙得水润土培.乙生辰月冠带,财官印俱全,主事业有成."
          bing: "丙火冠带在辰,辰为水库蓄水养火.丙生辰月冠带,食神旺,主才华初显."
          ding: "丁火冠带在丑,丑中己土泄火,辛金炼火.丁生丑月冠带,食神生财,主学业有成."
          wu: "戊土冠带在辰,辰中癸水润土,乙木疏土.戊生辰月冠带,官印相生,主功名."
          ji: "己土冠带在丑,丑中辛金泄土,癸水润土.己生丑月冠带,食神生财,主技艺."
          geng: "庚金冠带在未,未中己土生金,丁火炼金.庚生未月冠带,正印生身,主学业."
          xin: "辛金冠带在辰,辰中癸水洗金,乙木泄金.辛生辰月冠带,食神泄秀,主文化."
          ren: "壬水冠带在戌,戌中戊土克水,辛金生水.壬生戌月冠带,七杀有制,主权柄."
          gui: "癸水冠带在丑,丑中己土克水,辛金生水.癸生丑月冠带,七杀有印,主贵."

      linguan:  # 临官
        description: "任职/发展/工作——大吉,犹如做官,事业有成"
        positions:
          jia: "甲木临官在寅,寅为建禄之地.甲生寅月建禄格,身强财官可任,主富贵."
          yi: "乙木临官在卯,卯为建禄之地.乙生卯月建禄格,得火暖土培,主事业发达."
          bing: "丙火临官在巳,巳为建禄之地.丙生巳月建禄格,得壬水制火,主富贵."
          ding: "丁火临官在午,午为建禄之地.丁生午月建禄格,得癸水济火,主功名."
          wu: "戊土临官在巳,巳为建禄之地.戊生巳月建禄格,得癸水润土,主富贵."
          ji: "己土临官在午,午为建禄之地.己生午月建禄格,得癸水润土,主福泽."
          geng: "庚金临官在申,申为建禄之地.庚生申月建禄格,得丁火炼金,主贵."
          xin: "辛金临官在酉,酉为建禄之地.辛生酉月建禄格,得壬水洗金,主富."
          ren: "壬水临官在亥,亥为建禄之地.壬生亥月建禄格,得戊土制水,主贵."
          gui: "癸水临官在子,子为建禄之地.癸生子月建禄格,得丙火暖水,主富贵."

      diwang:  # 帝旺
        description: "顶峰/极盛/成功——最旺,犹如帝王,达到顶峰"
        positions:
          jia: "甲木帝旺在卯,卯为木之旺极.甲生卯月羊刃格,身极旺,需庚金雕琢方成大器."
          yi: "乙木帝旺在寅,寅为木旺之地.乙生寅月旺极,需丙火暖身,庚金修剪."
          bing: "丙火帝旺在午,午为火之旺极.丙生午月羊刃格,需壬癸水调候,水火既济."
          ding: "丁火帝旺在巳,巳为火旺之地.丁生巳月旺极,需壬水制火,庚金生水."
          wu: "戊土帝旺在午,午为火生土旺.戊生午月印旺身强,需甲木疏土,癸水润土."
          ji: "己土帝旺在巳,巳为火生土旺.己生巳月印旺,需癸水润泽,辛金泄秀."
          geng: "庚金帝旺在酉,酉为金之旺极.庚生酉月羊刃格,需丁火炼金,甲木佐之."
          xin: "辛金帝旺在申,申为金旺之地.辛生申月旺极,需壬水洗金,丙火暖金."
          ren: "壬水帝旺在子,子为水之旺极.壬生子月羊刃格,需戊土制水,丙火暖水."
          gui: "癸水帝旺在亥,亥为水旺之地.癸生亥月旺极,需己土制水,丙火暖局."

      shuai:  # 衰
        description: "衰退/减弱/退行——凶,盛极而衰"
        positions:
          jia: "甲木衰在辰,辰为土旺木衰.甲生辰月财旺,身弱需水木帮扶,衰运宜守."
          yi: "乙木衰在丑,丑为土旺木衰.乙生丑月财旺,身弱需火暖土培."
          bing: "丙火衰在未,未为土旺火衰.丙生未月食神旺,火衰需寅卯木生扶."
          ding: "丁火衰在戌,戌为土旺火衰.丁生戌月伤官旺,需甲木生火."
          wu: "戊土衰在未,未为木库土衰.戊生未月官旺,身弱需丙火生扶."
          ji: "己土衰在戌,戌为火库土衰.己生戌月官旺,需丙火暖土."
          geng: "庚金衰在戌,戌为火库金衰.庚生戌月官旺,需土金帮扶."
          xin: "辛金衰在丑,丑为土旺金衰.辛生丑月印旺,需火暖金."
          ren: "壬水衰在丑,丑为土旺水衰.壬生丑月官旺,需金水帮扶."
          gui: "癸水衰在戌,戌为土旺水衰.癸生戌月官旺,需辛金生水."

      bing:  # 病
        description: "生病/衰退/问题——凶,犹如生病,能量不足"
        positions:
          jia: "甲木病在巳,巳火泄木之气.甲生巳月病地,火旺木焚,需癸水润泽."
          yi: "乙木病在子,子水寒木之气.乙生子月病地,寒木需丙火暖阳."
          bing: "丙火病在申,申金耗火之气.丙生申月病地,财旺身弱,需木火生扶."
          ding: "丁火病在卯,卯木生火太过.丁生卯月病地,印旺身强,需财制印."
          wu: "戊土病在申,申金泄土之气.戊生申月病地,食神旺需火生土."
          ji: "己土病在卯,卯木克土.己生卯月病地,七杀克身,需火化杀."
          geng: "庚金病在亥,亥水泄金之气.庚生亥月病地,伤官旺需土金帮身."
          xin: "辛金病在午,午火克金.辛生午月病地,七杀克身,需土金生扶."
          ren: "壬水病在寅,寅木泄水之气.壬生寅月病地,食神旺需金水帮身."
          gui: "癸水病在酉,酉金生水太过.癸生酉月病地,印旺身强,需火暖水."

      si:  # 死
        description: "死亡/结束/停滞——大凶,犹如死亡,事物终结"
        positions:
          jia: "甲木死在午,午火焚木.甲生午月死地,火旺木焚,焦枯之象,急救癸水."
          yi: "乙木死在亥,亥水寒木.乙生亥月死地,水冷木僵,需丙火暖阳解冻."
          bing: "丙火死在酉,酉金耗火.丙生酉月死地,财旺身弱,需木火生扶."
          ding: "丁火死在寅,寅木生火反成灾.丁生寅月死地,印旺身弱需财制."
          wu: "戊土死在酉,酉金泄土.戊生酉月死地,食神泄身,需火生土."
          ji: "己土死在寅,寅木克土.己生寅月死地,七杀攻身,需火化杀."
          geng: "庚金死在子,子水泄金.庚生子月死地,食神旺需土金帮身."
          xin: "辛金死在巳,巳火克金.辛生巳月死地,官旺身弱,需土金生扶."
          ren: "壬水死在卯,卯木泄水.壬生卯月死地,伤官旺需金水帮身."
          gui: "癸水死在申,申金生水太过.癸生申月死地,印旺身弱,需火暖水."

      mu:  # 墓
        description: "墓库/收藏/积蓄——中性,犹如入墓,积蓄能量"
        positions:
          jia: "甲木墓在未,未为木库.甲生未月入墓,财星入库,需冲开发用,逢丑运冲开则发."
          yi: "乙木墓在戌,戌为火库.乙生戌月入墓,伤官入库,需辰运冲开."
          bing: "丙火墓在戌,戌为火库.丙生戌月入墓,火入库需冲开发用,逢辰运冲开大发."
          ding: "丁火墓在丑,丑为金库.丁生丑月入墓,财入库需未运冲开."
          wu: "戊土墓在戌,戌为火库.戊生戌月入墓,火土入库需辰运冲开."
          ji: "己土墓在辰,辰为水库.己生辰月入墓,财入库需戌运冲开."
          geng: "庚金墓在丑,丑为金库.庚生丑月入墓,金入库需未运冲开."
          xin: "辛金墓在辰,辰为水库.辛生辰月入墓,水入库需戌运冲开."
          ren: "壬水墓在辰,辰为水库.壬生辰月入墓,水入库需戌运冲开."
          gui: "癸水墓在未,未为木库.癸生未月入墓,食神入库需丑运冲开."

      jue:  # 绝
        description: "灭绝/消失/极端——大凶,犹如灭绝,彻底消失"
        positions:
          jia: "甲木绝在申,申金克木.甲生申月绝地,七杀克身,急救壬水化杀生身."
          yi: "乙木绝在酉,酉金克木.乙生酉月绝地,七杀攻身,需癸水印星化杀."
          bing: "丙火绝在亥,亥水克火.丙生亥月绝地,七杀克身,需甲木生火化杀."
          ding: "丁火绝在子,子水克火.丁生子月绝地,七杀攻身,需甲木生身."
          wu: "戊土绝在亥,亥水耗土.戊生亥月绝地,财旺身弱,需丙火生土."
          ji: "己土绝在巳,巳火生土反背.己生巳月绝地,印旺身弱,需金泄秀."
          geng: "庚金绝在寅,寅木耗金.庚生寅月绝地,财旺身弱,需土金帮扶."
          xin: "辛金绝在卯,卯木耗金.辛生卯月绝地,财旺身弱,需土生金."
          ren: "壬水绝在巳,巳火耗水.壬生巳月绝地,财旺身弱,需金水帮身."
          gui: "癸水绝在午,午火耗水.癸生午月绝地,财旺身弱,需庚金生水."

      tai:  # 胎
        description: "受胎/萌芽/酝酿——吉,犹如怀孕,新的开始"
        positions:
          jia: "甲木胎在酉,酉金生水养木.甲胎于酉,暗藏生机,逢亥子运发动."
          yi: "乙木胎在申,申金生水养木.乙胎于申,长生在午,胎中蓄势."
          bing: "丙火胎在子,子水养火之胎.丙胎于子,暗藏火种,逢寅午运发."
          ding: "丁火胎在亥,亥水养火之胎.丁胎于亥,暗藏生机,逢寅卯运发."
          wu: "戊土胎在子,子水养土之胎.戊胎于子,暗藏生机,逢巳午运发."
          ji: "己土胎在午,午火养土之胎.己胎于午,暗藏生机,逢巳午运发."
          geng: "庚金胎在卯,卯木养金之胎.庚胎于卯,暗藏生机,逢巳申运发."
          xin: "辛金胎在寅,寅木养金之胎.辛胎于寅,暗藏生机,逢巳申运发."
          ren: "壬水胎在午,午火养水之胎.壬胎于午,暗藏生机,逢申亥运发."
          gui: "癸水胎在巳,巳火养水之胎.癸胎于巳,暗藏生机,逢申亥运发."

      yang:  # 养
        description: "养育/培养/成长——吉,犹如养育,积蓄力量"
        positions:
          jia: "甲木养在戌,戌为土养木.甲养于戌,得土培根,逢亥寅运发荣."
          yi: "乙木养在未,未为土养木.乙养于未,得土培养,逢寅卯运发达."
          bing: "丙火养在丑,丑为土养火.丙养于丑,得土蓄火,逢巳午运发."
          ding: "丁火养在戌,戌为土养火.丁养于戌,得土蓄火,逢巳午运发."
          wu: "戊土养在丑,丑为土养土.戊养于丑,得土帮身,逢巳午运发."
          ji: "己土养在戌,戌为火库养土.己养于戌,得火暖土,逢巳午运发."
          geng: "庚金养在辰,辰为土养金.庚养于辰,得土生金,逢申酉运发."
          xin: "辛金养在丑,丑为土养金.辛养于丑,得土生金,逢申酉运发."
          ren: "壬水养在未,未为土养水.壬养于未,得土蓄水,逢申亥运发."
          gui: "癸水养在辰,辰为土养水.癸养于辰,得土蓄水,逢申亥运发."

  # ========== 二、空亡体系 完整版 ==========
  empty_death:
    theory:
      definition: "地支遇旬空为空亡,六十甲子每旬有两个地支为空.甲子旬中戌亥空,甲戌旬中申酉空,甲申旬中午未空,甲午旬中辰巳空,甲辰旬中寅卯空,甲寅旬中子丑空."
      rule1: "空亡地支遇六合不为空(合可解空)"
      rule2: "空亡逢冲以吉论,纳音相生更好(冲可解空)"
      rule3: "空亡的五行不起旺衰平衡作用,有视作无"
      rule4: "大运空而流年不空(大运之空流年可填实)"
      rule5: "空亡逢同类型相冲极凶(天干相同地支相冲)"
      rule6: "空亡逢六合不论空,其年平顺"
      rule7: "空亡地支在命局中占两个以上为真空,力量极弱"
      rule8: "空亡逢三合六合可解一部分空,但力量减半"
      rule9: "日柱空亡影响最大,时柱次之,月柱再次,年柱影响最小"
      rule10: "空亡之支在大运中出现为填实,可发挥作用但力量较弱"

    ten_gods:
      zhengcai:
        summary: "与父无缘,成年易婚变"
        details:
          - "因欺诈/盗贼蒙受财物损失"
          - "注意肠病/消化系统疾病"
          - "阳日生与妻缘分终尽(死或离)"
          - "阴日生则在情人身上发生"
          - "节俭者变挥霍,经济崩溃"
          - "好运也平白放过,错失良机"
          - "男命正财空亡主克妻或夫妻感情不和"
          - "经商者因贪小便宜而失大"
      piancai:
        summary: "与父无缘,性不耐静,色情之象"
        details:
          - "色情之象,风流多情"
          - "与祖父/岳父不合,关系紧张"
          - "多走动或职业需走动者吉"
          - "投资易失利,投机不宜"
          - "父亲身体较差或缘分薄"
          - "为人慷慨但难守财"
      zhengyin:
        summary: "与母亲/祖国无缘,离乡或出国"
        details:
          - "与母亲生离死别,缘分浅薄"
          - "待人处事出错/毁约/背信"
          - "横刀夺爱,感情纠纷"
          - "个性蒙昧/肤浅/草率"
          - "考试运不好,名誉受损"
          - "求学过程多波折,学历不高"
          - "不宜从事学术教育工作"
      pianyin:
        summary: "爱幻想/反省,精神衰弱"
        details:
          - "想停止工作,缺乏干劲"
          - "身体不眠/精神衰弱/失眠"
          - "与母亲/继母/养母无缘"
          - "心浮气躁/轻举妄动/随波逐浪"
          - "动中破财,入不敷出"
          - "演艺工作者名气如昙花一现"
          - "第六感强但精神不稳定"
      zhengguan:
        summary: "不受益于上司/子女问题"
        details:
          - "男性不受益于好上司,职场怀才不遇"
          - "女性丈夫调职/分居/婚缘不佳"
          - "女命空亡正官主第一段婚姻难白头"
          - "公职者官运不通,升迁困难"
      qisha:
        summary: "权力旁落,性格极端"
        details:
          - "军政界权旁落,不得实权"
          - "常人可免受困境/病痛之苦(因空亡减力)"
          - "性格好勇斗狠或畏首畏尾,走极端"
          - "偏官空亡则压力减轻,但同时失去魄力"
      bijian:
        summary: "谋职创业受阻多磨"
        details:
          - "谋职/创业受阻多磨,事倍功半"
          - "服务业/自由职业能有成就"
          - "兄弟朋友助力少,多靠自己"
      jiecai:
        summary: "狡诈,多口舌是非"
        details:
          - "狡诈,不诚信"
          - "合作易吃亏,朋友多算计"
          - "兄弟姐妹缘分薄"
      jianlu: "虚名虚利,学而无成,一生破散"
      liuhai: "横死,意外之灾.若逢冲克更验"
      taohua: "情缘困扰/情祸/感情失落"
      guiren: "演艺人员/歌星/舞女/文艺创作者"

    swap_analysis:
      year_dayun: "年柱与大运互换空亡:多不利长亲,祖坟多空败,祖业凋零"
      month_dayun: "月柱和大运互换空亡:女和丈夫不利,男命父母兄弟不利"
      day_dayun: "生日与大运互换空亡:主配偶不利,婚姻不顺"
      hour_dayun: "时柱与大运互换空亡:主子女不利,晚年孤独"
      year_liunian: "流年与大运互换空亡:测这一年一事无成,虚度光阴"
      full_swap: "年柱与月柱互换空亡:父母双亡或早逝之兆.月柱与日柱互换空亡:中年多灾厄"

    shen_sha_empty:
      huagai: "聪明/脱俗/为僧道学者/诗人/画家,空亡则孤芳自赏,不食人间烟火"
      wangshen: "多好阿谀奉承,多靠文笔起家,家中有夭亡横死之人,有失落感"
      jiesha: "狡诈,多阴谋诡计,不宜深交"
      guche_gua_su: "日月支坐孤虚或空亡多自己独处,性格孤僻,喜欢一人睡,晚婚"
      taohua: "桃花空亡则感情空虚,恋爱多无果"
