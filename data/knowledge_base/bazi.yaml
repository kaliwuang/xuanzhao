  # ========== 五、拱局暗带 ==========
  gong_ju:
    definition: "两支夹出中间一字,如子寅夹出丑,卯巳夹出辰等"
    theory: "两支相间一位,夹出中间的地支,该地支暗中发挥作用"
    rules:
      - "子寅夹丑,丑为暗拱"
      - "卯巳夹辰,辰为暗拱"
      - "午申夹未,未为暗拱"
      - "酉亥夹戌,戌为暗拱"
      - "寅辰夹卯,卯为暗拱"
      - "巳未夹午,午为暗拱"
      - "申戌夹酉,酉为暗拱"
      - "亥丑夹子,子为暗拱"
    meaning: "暗中助力/不完全的力量/背后支撑,如拱出官星则暗中得贵,拱出财星则暗中得财"
    usage: "拱局之力约为明现之字的一半,但逢冲开则发力完全"

  an_dai:
    theory: "60组暗带关系,每个日柱暗带两个相关地支"
    meaning: "间接影响/隐藏的关系/暗中的助力或阻力"
    usage: "暗带在断流年时尤验,如大运流年冲开暗带之字应事"

