    investment_related:  # 投资关联判词
      - "太岁:易判断错误,造成金钱或投资损失"  # 全书首次
      - "白虎:倒会或借钱不还"  # 民间金融风险
      - "大耗:有大破财之象"
      - "小耗:为小事破财"
    
    exam_related:  # 考试关联判词
      - "五鬼:考运佳"  # 五鬼年考试运气好
      - "八座:利于考试此年"  # 唯一考试直接相关
      - "太阳:男命名得随心"
    
    marriage_related:  # 婚姻关联判词
      - "岁破:如完婚易破缘"  # 缔结禁忌
      - "太阴女命:无精打采心发闷"  # 情绪
      - "白虎:女人有喜则吉"  # 怀孕免灾
      - "丧门:主孝服凶灾"
    
    career_specific:  # 职业限定判词
      - "天狗:从事政治或商业人士易犯官非"
      - "龙德:利升官求财,生意兴隆"
      - "太岁:造成投资损失"
