  # ========== 第二表 (P283-P286) ==========
  table_2:
    name: "神煞星曜对应表·第二表"
    pages: "P283-P286"
    feature: "星曜重分配系统——与第一表各组星曜全部不同的新分配方案"
    
    groups:
      - id: 1_2
        name: 太岁(第二表)
        stars:
          male: 计都
          female: 太阳
        attached: [擎天, 剑锋]  # 全新凶煞
        note: "擎天寓意太岁之力不可抗拒,剑锋寓意刀剑锋芒"
      
      - id: 2_2
        name: 太阳(第二表)
        stars:
          male: 土星
          female: 太阳
        note: "星曜分配与第一表义理相反"
      
      - id: 3_2
        name: 丧门(第二表)
        stars:
          male: 木星
          female: 水星
        note: "男女星曜互换——第一表男水星/女木星→第二表男木星/女水星"
      
      - id: 4_2
        name: 太阴(第二表)
        stars:
          male: 计都
          female: 罗睺
        attached: [勾绞, 羊刃]  # 与第一表同附属但星曜不同
        note: "勾绞=勾连纠缠,羊刃=刀剑锋芒"
      
      - id: 5_2
        name: 五鬼(第二表)
        stars:
          male: 罗睺
          female: 计都
        attached: [官符]
        note: "官符为全新附属——仅8字判词'主犯官非,虚耗钱财'"
      
      - id: 6_2
        name: 死符(第二表)
        stars:
          male: 火星
          female: 罗睺
        attached: [小耗, 月德]
      
      - id: 7_2
        name: 岁破(第二表)
        stars:
          male: 太阴
          female: 金星
        attached: [大耗, 月恩]
        note: "月恩=月亮的恩惠,两凶一吉混合组"
      
      - id: 8_2
        name: 龙德(第二表)
        stars:
          male: 罗睺
          female: 计都
      
      - id: 9_2
        name: 白虎(第二表)
        stars:
          male: 罗睺
          female: 火星
        note: "星曜互换:男火星→男罗睺,女罗睺→女火星"
      
      - id: 10_2
        name: 福德(第二表)
        stars:
          male: 罗睺
          female: 计都
        attached: [天德]
      
      - id: 11_2
        name: 病符(第二表)
        stars:
          male: 计都
          female: 太阳
        attached: [凶神]

    key_findings:
      - "第二表星曜重分配——与第一表各组星曜完全不同"
      - "男女星曜互换倾向——第一表男A女B,第二表男B女A"
      - "提出了4种全新附属神煞:勾绞/羊刃/官符/月恩"
      - "14组神煞总结构:太岁三大组/口舌三大组/伤害三大组/性别对称组/病符组"

  # ========== 第三表 (P287-P290) ==========
  table_3:
    name: "神煞星曜对应表·第三表"
    pages: "P287-P290"
    feature: "星曜再分配系统——第三套分配方案"
    
    known_groups:
      - name: 太阳
        stars: [罗睺, 计都]
      - name: 丧门
        stars: [计都, 太阳]
      - name: 五鬼
        stars: [太阳, 土星]  # 第三表五鬼组的星曜分配不同于第一/二表
      - name: 死符
        stars: [计都, 太阳]

    key_findings:
      - "死符/小耗/月德的星曜分配在第三表中再次变异"
      - "月德被单独列为独立神煞并获独立诗决"  # 三表中首次
      - "九曜三组稳定组：五鬼/岁破/天狗在前三表中星曜保持一致"
      - "五鬼组在第三表中星曜改为太阳/土星(不同于第一表的太阴/金星和第二表的罗睺/计都)"

  # ========== 第四表 (P291-P294) ==========
  table_4:
    name: "神煞星曜对应表·第四表"
    pages: "P291-P294"
    feature: "第一表复刻修订版+新增神煞组的混合模式"
    
    groups:
      - id: new_1
        name: 岁劫杀
        stars:
          male: 金星
          female: 太阴
        note: "全新独立神煞组名,不是太岁组变体"
        attached: [地棍, 地裕]  # 丧门变体
      
      - id: new_2
        name: 太阴(第四表,无羊刃)
        stars:
          male: 罗睺
          female: 计都
        note: "羊刃从太阴组移除——第四表重大修订"
      
      - id: new_3
        name: 五鬼(第四表)
        stars:
          male: 土星
          female: 火星
        note: "星曜改为土星/火星——前三表均为太阴/金星(第一表)和罗睺/计都(第二表)"
        key: "制五鬼运财化解法首次进入神煞判词"  # 全书首创
      
      - id: r1
        name: 死符(回归第一表)
        stars:
          male: 水星
          female: 木星
        note: "回归第一表模式"
      
      - id: r2
        name: 岁破(回归第一表)
        stars:
          male: 金星
          female: 太阴
        judgement: "岁破即冲太岁——第四种开场表述"
      
      - id: r3
        name: 龙德(回归第一表)
        stars:
          male: 紫微
          female: 紫微
        attached: [天危]  # 天德→天危,吉转凶,全书首次出现
        note: "附属神煞'天德→天危'——天德(天的恩德)变为天危(天的危险)"
      
      - id: r4
        name: 白虎(回归第一表)
        stars:
          male: 火星
          female: 罗睺
        judgement: "朋友失信借钱不还——新增社会维度"
      
      - id: new_4
        name: 天狗(第四表,打破三表稳定性)
        stars:
          male: 太阴
          female: 金星
        note: "前三表中天狗组稳定为太阳/土星,第四表变异为太阴/金星"
        attached: [八座, 吊客]  # 附属顺序颠倒:前表吊客/八座→本表八座/吊客
        judgement: "从事政治或商业人士易犯官非"  # 全书首创职业限定判词
        details:
          - "居住职业不测之变迁"
          - "忌夜远行有损伤车队"
          - "八座则利于考试此年"  # 全书唯一考试直接相关神煞
      
      - id: r5
        name: 福德(回归第一表)
        stars:
          male: 计都
          female: 太阳
        attached: [天德]
      
      - id: r6
        name: 病符(第四表,男女互换)
        stars:
          male: 木星
          female: 水星
        note: "第一表男水星/女木星→第四表男木星/女水星——性别星曜互换"
        attached: [凶神]  # 无双神煞(前三表有陌越)

    key_findings:
      - "第四表=第一表复刻修订+新增神煞组的混合模式"
      - "附属神煞修订规律:天→危、卷→德、丧→棍"
      - "职业限定型判词是全书神煞判词中的首创"
      - "天狗组打破三表稳定性(太阳/土星→太阴/金星)"
      - "病符组男女星曜互换(第一表男水星/女木星→第四表男木星/女水星)"

