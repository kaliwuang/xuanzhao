# ============================================================
sihua:
  description: "四化即化禄、化权、化科、化忌，代表星曜在不同天干年份产生的四种变化。"
  birth_year_table:
    甲: { 廉贞: "化禄", 破军: "化权", 武曲: "化科", 太阳: "化忌" }
    乙: { 天机: "化禄", 天梁: "化权", 紫微: "化科", 太阴: "化忌" }
    丙: { 天同: "化禄", 天机: "化权", 文昌: "化科", 廉贞: "化忌" }
    丁: { 太阴: "化禄", 天同: "化权", 天机: "化科", 巨门: "化忌" }
    戊: { 贪狼: "化禄", 太阴: "化权", 右弼: "化科", 天机: "化忌" }
    己: { 武曲: "化禄", 贪狼: "化权", 天梁: "化科", 文曲: "化忌" }
    庚: { 太阳: "化禄", 武曲: "化权", 太阴: "化科", 天同: "化忌" }
    辛: { 巨门: "化禄", 太阳: "化权", 文曲: "化科", 文昌: "化忌" }
    壬: { 天梁: "化禄", 紫微: "化权", 左辅: "化科", 武曲: "化忌" }
    癸: { 破军: "化禄", 巨门: "化权", 太阴: "化科", 贪狼: "化忌" }

  sihua_meaning:
    化禄: "主财富、机遇、人缘、享受。化禄之星所在的宫位代表该方面有增益和好运。"
    化权: "主权力、掌控、决断、扩张。化权之星所在的宫位代表该方面有控制力和主导权。"
    化科: "主名声、学识、文采、贵人。化科之星所在的宫位代表该方面有声望和认可。"
    化忌: "主困扰、缺失、阻碍、考验。化忌之星所在的宫位代表该方面有困难和需要修行的课题。"

  dalian_sihua:
    description: "大限四化以每个大限的宫干为基准，推算该大限十年内的四化变化，是生年四化的动态叠加。"
    method: "每个大限宫位有其天干（依据生年天干五虎遁推算），以此天干查四化表得出该大限的四化星曜。"

  liunian_sihua:
    description: "流年四化以流年地支定宫位、流年天干定四化，是每年吉凶变化的判断依据。"
    method: "流年地支定命宫所在宫位，流年天干查四化表得出该年的四化星曜。"

  three_layer_overlay:
    description: "三层叠加法：将生年四化、大限四化、流年四化同时看同一颗星，三层皆化禄则大吉，三层皆化忌则大凶。"
    example: "某星生年化禄+大限化禄+流年化禄=三禄汇局，财运极旺；反之三忌汇局则需谨慎。"

# ============================================================
# 六、常用格局30个
# ============================================================
patterns:
  火贪格:
    stars: "火星+贪狼"
    description: "火星与贪狼同宫或在三合会照，主横发横破。暴发暴败格局。"
    detail: "火星激发贪狼的桃花和欲望，爆发力极强，一夜暴富或突然成名，但运过即败。"
    palace: "命宫或财帛宫"

  铃贪格:
    stars: "铃星+贪狼"
    description: "铃星与贪狼同宫，比火贪更持久，横发后能守成一段时间。"
    detail: "铃星的阴火引动贪狼的欲望，属于隐秘而持久的爆发力。"
    palace: "命宫或财帛宫"

  月朗天门:
    stars: "太阴在亥宫庙旺"
    description: "太阴在亥宫为庙旺之地，称为月朗天门。主一生福厚，有名望。"
    detail: "亥时为夜晚，太阴当空最亮，此时太阴力量最强，主人聪明秀丽，福泽深厚。"
    palace: "命宫"

  紫微朝垣:
    stars: "紫微在午宫"
    description: "紫微在午宫庙旺，如帝王登基。主大富大贵，位极人臣。"
    detail: "午宫为正南离位，紫微在此如帝王临朝，格局极高。"
    palace: "命宫"

  府相朝垣:
    stars: "天府+天相在三方"
    description: "天府与天相在三方四正相会，主贵气大盛，一生安稳有依靠。"
    detail: "天府为南斗主星，天相为印星，二者会照如文武兼备，贵人运佳。"
    palace: "命宫及三合宫"

  杀破狼:
    stars: "七杀+破军+贪狼"
    description: "七杀、破军、贪狼三颗星在命宫三合会照或连珠排列，称杀破狼格局。"
    detail: "主一生大起大落，变动剧烈，宜军警、创业、开拓性行业。"
    palace: "命宫三合"

  机月同梁:
    stars: "天机+太阴+天同+天梁"
    description: "天机、太阴、天同、天梁四星在命宫三合会照。"
    detail: "主聪明文雅，适合文职、公职、教育、法律等行业，一生平稳有福。"
    palace: "命宫三合"

  阳梁昌禄:
    stars: "太阳+天梁+文昌+禄存"
    description: "太阳、天梁、文昌（或文曲）、禄存在命宫三合会照。"
    detail: "主考试运极佳，学业有成，适合公务员、教育、法律领域，名利双收。"
    palace: "命宫三合"

  紫府同宫:
    stars: "紫微+天府"
    description: "紫微与天府同宫在寅或申，二帝星相会。"
    detail: "格局极高，帝王之气加财库之丰，一生贵不可言，但易孤高。"
    palace: "命宫"

  日月同宫:
    stars: "太阳+太阴"
    description: "太阳与太阴同宫在丑或未，日月并明。"
    detail: "阴阳调和，性格全面，男女皆主贵，但须看庙旺情况。"
    palace: "命宫"

  日月并明:
    stars: "太阳在卯+太阴在酉"
    description: "太阳在卯宫（旭日东升），太阴在酉宫（月照西方），各居庙旺且在对宫。"
    detail: "阴阳各得其位，格局极高，主大富大贵。"
    palace: "命宫与对宫"

  天魁天钺夹命:
    stars: "天魁+天钺在相邻宫夹命宫"
    description: "命宫被天魁和天钺夹住，贵气逼人。"
    detail: "一生贵人不断，考试升迁运极佳。"
    palace: "命宫"

  禄存夹命:
    stars: "禄存在相邻宫夹命宫"
    description: "命宫被禄存夹住，财富运佳。"
    detail: "财库有护，一生钱财不缺。"
    palace: "命宫"

  羊陀夹命:
    stars: "擎羊+陀罗在相邻宫夹命宫"
    description: "命宫被擎羊和陀罗夹住，煞气较重。"
    detail: "一生压力大，是非多，需不断奋斗突破。"
    palace: "命宫"

  火铃夹命:
    stars: "火星+铃星在相邻宫夹命宫"
    description: "命宫被火星和铃星夹住。"
    detail: "突发变故多，易有血光之灾，但爆发力也强。"
    palace: "命宫"

  空劫夹命:
    stars: "地空+地劫在相邻宫夹命宫"
    description: "命宫被地空和地劫夹住。"
    detail: "理想空幻，财来财去，适合修行或艺术。"
    palace: "命宫"

  文星拱命:
    stars: "文昌+文曲在三方"
    description: "文昌和文曲在三方四正拱照命宫。"
    detail: "文采斐然，科甲功名顺遂。"
    palace: "命宫"

  辅弼拱主:
    stars: "左辅+右弼在三方"
    description: "左辅和右弼在三方四正拱照命宫。"
    detail: "得众人之助，事业有成。"
    palace: "命宫"

  明珠出海:
    stars: "太阴在亥+天机在丑+天同在未"
    description: "太阴在亥庙旺，天机在丑，天同在未，三合而成。"
    detail: "福寿双全的格局，晚年大吉。"
    palace: "命宫三合"

  巨火擎羊:
    stars: "巨门+火星+擎羊"
    description: "巨门与火星、擎羊同宫或会照。"
    detail: "是非口舌极重，易有官司诉讼，严重者有血光。"
    palace: "命宫"

  铃昌陀武:
    stars: "铃星+文昌+陀罗+武曲"
    description: "铃星、文昌、陀罗与武曲四星会照。"
    detail: "主横发横破，先富后贫，格局变化极大。"
    palace: "命宫"

  阳梁荫福:
    stars: "太阳+天梁"
    description: "太阳与天梁同宫或三合，主福荫深厚。"
    detail: "有长辈贵人庇荫，一生顺遂。"
    palace: "命宫"

  天同福荫:
    stars: "天同+天梁"
    description: "天同与天梁同宫或会照。"
    detail: "福寿双全，晚年极佳。"
    palace: "命宫"

  禄马交驰:
    stars: "禄存+天马"
    description: "禄存与天马在三方四正会照。"
    detail: "动中求财，奔波致富，适合国际贸易、物流行业。"
    palace: "财帛宫或迁移宫"

  财印双全:
    stars: "武曲+天相"
    description: "武曲与天相在三方会照。"
    detail: "既有财富又有地位，名利双收。"
    palace: "命宫"

  刑囚夹印:
    stars: "廉贞+天相+擎羊"
    description: "廉贞（刑星）+天相（印星）被擎羊夹。"
    detail: "易有官非诉讼，需谨慎行事。"
    palace: "命宫"

  府相朝迁:
    stars: "天府+天相在迁移宫三合"
    description: "天府与天相在迁移宫的三方会照。"
    detail: "外出发展极佳，在他乡受人尊重。"
    palace: "迁移宫"

  极居卯酉:
    stars: "紫微+贪狼在卯酉"
    description: "紫微和贪狼同宫在卯或酉。"
    detail: "帝王与桃花同宫，主有艺术气质，但也易沉迷酒色。"
    palace: "命宫"

  马头带剑:
    stars: "天马+擎羊"
    description: "天马与擎羊同宫。"
    detail: "奔波中有血光之灾，但也能在风险中获得机遇。"
    palace: "迁移宫"

  日月反背:
    stars: "太阳在酉+太阴在卯"
    description: "太阳在酉（日落西山），太阴在卯（月落）。"
    detail: "阴阳颠倒，一生辛劳，晚发之命。"
    palace: "命宫"

# ============================================================
# 七、健康看盘体系 — 疾厄宫详解
# ============================================================
health_system:
  description: "紫微斗数健康看盘以疾厄宫为核心，结合主星五行、辅星性质、三方四正综合判断。"

  main_star_diseases:
    紫微:
      organs: "脾、胃、肠道"
      diseases: "脾胃虚弱、消化不良、便秘腹泻、富贵病（高血脂高血压）"
      note: "紫微星入疾厄宫，脾胃功能是重点监控对象。紫微加煞星如擎羊，主脾胃手术。"
    天机:
      organs: "神经系统、肝胆、四肢"
      diseases: "神经衰弱、失眠多梦、焦虑症、肝胆疾病、手脚酸麻"
      note: "天机入疾厄主神经敏感，思虑过度引发失眠。加火星主神经性头痛。"
    太阳:
      organs: "心脏、眼睛、头部"
      diseases: "心脏病、高血压、眼疾（近视/白内障）、头痛眩晕"
      note: "太阳入疾厄主心火旺，易有心血管疾病。太阳化忌时眼疾加重。"
    武曲:
      organs: "肺、气管、骨骼、牙齿"
      diseases: "肺炎、支气管炎、骨折骨裂、牙痛、关节炎"
      note: "武曲属金，金主肺和骨骼。武曲化忌加羊陀主骨骼骨折。"
    天同:
      organs: "内分泌系统、肾脏、膀胱"
      diseases: "内分泌失调、糖尿病、水肿、肾脏虚弱"
      note: "天同属水，水主肾。天同入疾厄福气深但易有慢性代谢病。"
    廉贞:
      organs: "血液、淋巴、免疫系统、生殖系统"
      diseases: "血液病（贫血/白血病）、淋巴肿痛、免疫低下、性病"
      note: "廉贞为次桃花星，入疾厄主血液疾病和桃花病。加擎羊主血光手术。"
    天府:
      organs: "胃、消化系统、皮肤"
      diseases: "胃炎、胃溃疡、消化不良、皮肤过敏"
      note: "天府属土，主脾胃。天府入疾厄一般体质较好，但易暴饮暴食。"
    太阴:
      organs: "妇科、肾、眼睛（左眼）"
      diseases: "妇科病（月经不调/肌瘤）、肾脏虚弱、眼疾"
      note: "太阴入疾厄女命妇科是重点。太阴化忌加煞星主子宫肌瘤。"
    贪狼:
      organs: "肝胆、性器官、生殖系统"
      diseases: "肝炎/脂肪肝、胆结石、性病、生殖系统疾病"
      note: "贪狼为大桃花星，入疾厄注意肝胆和性病。加火铃主肝胆炎症。"
    巨门:
      organs: "口、舌、咽喉、食道、肠胃"
      diseases: "口腔溃疡、咽喉炎、食道炎、胃炎、消化系统"
      note: "巨门主口舌，入疾厄口咽部位易出问题。加陀罗主慢性咽炎。"
    天相:
      organs: "泌尿系统、膀胱、肾脏"
      diseases: "尿道炎、膀胱炎、肾炎、排尿异常"
      note: "天相为印星，入疾厄主泌尿系统问题。加煞星主结石。"
    天梁:
      organs: "长寿相关、脾胃、骨骼"
      diseases: "天梁为荫星福星，入疾厄主长寿体质，但老年需防骨骼退化"
      note: "天梁有消灾解厄之功，大限疾厄逢天梁主度过难关。"
    七杀:
      organs: "筋骨、肺、创伤部位"
      diseases: "筋骨损伤、骨折、肺部疾病、外伤"
      note: "七杀主将星，入疾厄主外伤、手术。加羊陀血光之灾明显。"
    破军:
      organs: "肾脏、膀胱、生殖系统"
      diseases: "肾炎、膀胱炎、前列腺问题、肾结石"
      note: "破军属水，入疾厄主肾脏膀胱问题。破军化忌加煞主肾衰竭风险。"

  auxiliary_star_combinations:
    擎羊_陀罗:
      type: "慢性病、宿疾"
      description: "羊陀入疾厄主慢性病常年困扰，如慢性关节炎、慢性胃炎。擎羊主急性发作，陀罗主迁延不愈。"
    火星_铃星:
      type: "突发疾病、炎症"
      description: "火铃入疾厄主突发性疾病，如急性阑尾炎、突发高烧。火星主急症，铃星主隐藏性炎症。"
    地空_地劫:
      type: "奇症、疑难杂症"
      description: "空劫入疾厄主罕见的疑难杂症，现代医学难以诊断。也主精神类疾病和心理问题。"
    文昌_文曲:
      type: "神经系统、精神紧张"
      description: "昌曲入疾厄主神经系统紧张导致的失眠、神经衰弱，多因脑力工作过度。"
    左辅_右弼:
      type: "体质增强，但有依赖性"
      description: "辅弼入疾厄主身体恢复力强，但可能有药物依赖或过度医疗倾向。"
    天魁_天钺:
      type: "遇良医，逢凶化吉"
      description: "魁钺入疾厄主生病能遇到好医生，重病也能转危为安。"

  sanfang_health_method:
    description: "三方四正健康判断法：不仅看疾厄宫主星，还要看疾厄宫的三方四正宫位（父母宫、兄弟宫、田宅宫）内的星曜。"
    method:
      - "第一步：看疾厄宫主星定主要疾病倾向"
      - "第二步：看疾厄宫辅星定疾病性质（慢性/突发/奇症）"
      - "第三步：看疾厄宫四化，化忌加重、化科减轻"
      - "第四步：看三方宫位是否有对冲煞星"
      - "第五步：综合命宫、福德宫看当事人的整体体质和精神状态"
    example:
      疾厄宫紫微+擎羊: "紫微主脾胃，擎羊为刀煞，主脾胃手术。三方会武曲（骨骼），注意同步检查骨骼。"
      疾厄宫天机+火星: "天机主神经，火星主突发，主突发神经性头痛。三方会太阳，注意血压问题。"
      疾厄宫廉贞+地劫: "廉贞主血液，地劫主奇症，主罕见的血液疾病。三方会七杀，有手术可能。"

# ============================================================
# 八、大限流年判断
# ============================================================
lifespan:
  description: "大限（大运）和流年（小运）是紫微斗数动态判断的核心体系。"

  dalian_start:
    method: "起运年龄以生年天干和性别定阳阴，顺行或逆行排大限。"
    rules:
      male_yang: "男性生年天干为阳（甲丙戊庚壬），大限从命宫顺行"
      male_yin: "男性生年天干为阴（乙丁己辛癸），大限从命宫逆行"
      female_yin: "女性生年天干为阴（乙丁己辛癸），大限从命宫顺行"
      female_yang: "女性生年天干为阳（甲丙戊庚壬），大限从命宫逆行"
    example: "甲年男性为阳男，从命宫起顺排大限。第一大限命宫1-10岁，第二大限父母宫11-20岁，依次类推。"
    default_start_age: "通常以虚岁4岁起运，具体视流派有所不同。常见起运岁：4、6、10、12"

  dalian_ten_years:
    description: "每个大限管十年运势，从命宫开始每宫十年。"
    sequence: "命宫(1-10/4-13)→父母宫→福德宫→田宅宫→官禄宫→交友宫→迁移宫→疾厄宫→财帛宫→子女宫→夫妻宫→兄弟宫"
    judgement:
      - "看大限宫内的主星和辅星定吉凶基调"
      - "看大限宫干引发的四化"
      - "看大限宫与生年四化的叠加互动"
      - "看大限宫的三方四正是否有煞星或吉星"

  liunian_judgement:
    description: "流年看一年之运，以流年地支定流年命宫所在位置。"
    method:
      - "以流年地支（如子年、丑年等）找到流年命宫位置"
      - "看流年命宫中的星曜定当年运势基调"
      - "看流年天干引发的流年四化"
      - "看流年宫与生年、大限四化的三层叠加"
      - "检查流年煞星（羊陀火铃空劫）的方位"
    key_principle: "生年为体，大限为用，流年为变。三层叠加是判断吉凶的关键。"
    
  three_layer_example:
    example_1:
      scenario: "某星生年化禄+大限化禄+流年化禄"
      result: "三禄汇聚，该年此星所主领域（如财帛宫主财运）极度旺盛，把握重大机遇。"
    example_2:
      scenario: "某星生年化忌+大限化忌+流年化忌"
      result: "三忌汇聚，该年此星所主领域（如疾厄宫主健康）有重大危机，需极度谨慎。"
    example_3:
      scenario: "某星生年化权+大限化科+流年化禄"
      result: "权科禄三吉汇聚，该年事业、名声、财富三丰收。"
    example_4:
      scenario: "某星生年化禄+大限化忌"
      result: "生年吉但大限凶，该十年内先好后坏，或表面风光内有隐忧。"

  special_notes:
    note_1: "大限逢杀破狼（七杀、破军、贪狼），主该十年有重大变革和机遇。"
    note_2: "大限逢空劫夹、羊陀夹，主该十年压力大，需谨慎行事。"
    note_3: "流年逢太岁煞（流年地支与命宫地支相冲），主该年变动大，需格外谨慎。"
    note_4: "流年四化中，流年化忌冲哪个宫位，该宫位所主领域是该年的重点问题。"

# ============================================================
# 九、五行生克在紫微斗数中的应用
# ============================================================
wuxing_application:
  description: "五行（金木水火土）是紫微斗数底层逻辑，决定星曜性质和宫位互动。"
  generating: "金生水→水生木→木生火→火生土→土生金"
  overcoming: "金克木→木克土→土克水→水克火→火克金"
  star_wuxing:
    金: "武曲（辛金）、文昌（辛金）、擎羊（庚金）、陀罗（辛金）"
    木: "天机（乙木）、贪狼（甲木）、廉贞（甲木+丁火）"
    水: "天同（壬水）、太阴（癸水）、巨门（癸水+己土）、破军（癸水）、文曲（癸水）、右弼（癸水）、天相（壬水）"
    火: "太阳（丙火）、廉贞（丁火）、火星（丙火）、铃星（丁火）、天魁（丙火）、天钺（丙火）、地空（丙火）、地劫（丙火）、天马（丙火+壬水）"
    土: "紫微（己土）、天府（戊土）、天梁（戊土）、左辅（戊土）、禄存（己土）"
  application:
    - "命宫星五行与宫位五行相生为吉，相克为凶"
    - "疾厄宫星五行与被克器官对应（金克木→肺克肝）"
    - "四化改变了星的力量方向，五行平衡被打破时易出问题"
    - "三方四正中五行相生的星曜组合为吉助，相克为凶扰"

# ============================================================
# 十、附录 — 补充说明
# ============================================================
appendix:
  note_1: "以上内容为紫微斗数基础理论和片段。完整看盘需要结合实际排盘，进行宫位、星曜、四化的综合判断。"
  note_2: "紫微斗数共有约120颗星曜，但常用的主星14颗、辅星14颗、杂星30余颗。最重要的是14主星和四化体系。"
  note_3: "命宫无主星时（空宫），需看对宫迁移宫借星，这是紫微斗数的重要技法。"
  note_4: "紫微斗数流派众多（三合派、四化派、飞星派等），以上内容以三合派为主体，融合四化派的部分理念。"
  note_5: "健康判断仅供参考，具体健康问题请以现代医学检查为准。"
